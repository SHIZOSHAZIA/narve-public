name: Сообщить об ошибке
description: Ошибка в публичной сборке или документации NARVE
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за сообщение. Не прикладывайте память, диалоги, токены и другие личные данные.
  - type: input
    id: version
    attributes:
      label: Версия NARVE
      description: Укажите номер сборки или напишите «документация».
      placeholder: Например, 0.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Раздел
      options:
        - Запуск и установка
        - Интерфейс
        - Чат и модели
        - Память и личность
        - Голос
        - Персонаж
        - Экран и документы
        - Автономность
        - Настройки
        - Документация
        - Другое
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Как воспроизвести
      description: Опишите действия по порядку.
      placeholder: |
        1. Открыл...
        2. Нажал...
        3. Произошло...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Система
      placeholder: Windows 11, GPU, объём RAM
  - type: textarea
    id: attachments
    attributes:
      label: Дополнительные материалы
      description: Только очищенные скриншоты и отчёты без личных данных.
  - type: checkboxes
    id: privacy
    attributes:
      label: Проверка приватности
      options:
        - label: Я проверил материалы и удалил личные сообщения, память, ключи и токены.
          required: true
