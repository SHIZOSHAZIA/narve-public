name: Предложить функцию
description: Идея или улучшение для NARVE
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Опишите проблему и желаемый пользовательский результат. Внутренняя архитектура может отличаться от предложенной реализации.
  - type: textarea
    id: problem
    attributes:
      label: Какая проблема существует
      description: Почему текущего или запланированного поведения недостаточно?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое поведение
      description: Как пользователь будет пользоваться функцией?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Направление
      options:
        - Личность и эмоции
        - Память
        - Голос
        - 2D-персонаж
        - Экран и зрение
        - Документы
        - Автономность
        - Инструменты
        - Настройки
        - Приватность
        - Производительность
        - Другое
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Пример использования
      placeholder: Пользователь говорит или делает..., NARVE отвечает...
  - type: textarea
    id: risks
    attributes:
      label: Возможные риски
      description: Приватность, нагрузка, ложные срабатывания или навязчивость.
  - type: checkboxes
    id: checks
    attributes:
      label: Проверка
      options:
        - label: Я проверил публичную дорожную карту и не нашёл точного дубликата.
          required: true
